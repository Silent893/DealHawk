services:
  dealhawk:
    build: .
    container_name: dealhawk
    restart: unless-stopped
    ports:
      - "3082:3000"
    env_file:
      - .env
    volumes:
      - /mnt/user/junk/dealhawk-images:/app/data/images
    # Chromium's profile, disk cache and shared-memory files (--disable-dev-shm-usage
    # redirects those here). RAM-backed so they never reach the writable layer or
    # wear the array, and cleared on every restart.
    tmpfs:
      - /tmp:rw,size=2g,mode=1777
