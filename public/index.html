<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealHawk</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">🦅 DealHawk</h1>
        <span id="app-version" style="font-size:0.7rem;color:var(--text-muted);margin-left:8px;opacity:0.6"></span>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-view="jobs">Jobs</button>
        <button class="nav-btn" data-view="listings">Listings</button>
        <button class="nav-btn" data-view="runs">Run History</button>
      </nav>
      <button class="btn btn-primary" id="new-job-btn">+ New Job</button>
    </header>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <!-- Jobs View -->
      <section class="view active" id="jobs-view">
        <div class="stats-overview" id="stats-overview"></div>
        <div class="jobs-grid" id="jobs-grid"></div>
        <div class="empty-state" id="jobs-empty" style="display:none">
          <p>No jobs configured yet.</p>
          <button class="btn btn-primary" onclick="openWizard()">Create your first job</button>
        </div>
      </section>

      <!-- Listings View -->
      <section class="view" id="listings-view">
        <div class="filter-bar" id="listings-filter-bar">
          <input class="form-input" id="listing-search" placeholder="Search title..." style="max-width:200px"
            onkeyup="if(event.key==='Enter')loadListings()">
          <select id="listing-job-filter">
            <option value="">All Jobs</option>
          </select>
          <select id="listing-status-filter">
            <option value="">All Status</option>
            <option value="active">🟢 Active</option>
            <option value="sold">🔴 Sold</option>
            <option value="excluded">⛔ Excluded</option>
          </select>
          <select id="listing-sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="price_low">Price: Low → High</option>
            <option value="price_high">Price: High → Low</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="listing-matched-filter" checked> Matched only
          </label>
          <button class="btn btn-sm" onclick="loadListings()">Apply</button>
        </div>
        <div class="listings-grid" id="listings-grid"></div>
        <div class="pagination" id="listings-pagination"></div>
      </section>

      <!-- Runs View -->
      <section class="view" id="runs-view">
        <div class="runs-table-wrap" id="runs-table-wrap"></div>
      </section>

      <!-- Job Detail View -->
      <section class="view" id="job-detail-view">
        <div style="margin-bottom:16px">
          <button class="btn btn-ghost" onclick="showView('jobs')" style="font-size:0.85rem">← Back to Jobs</button>
          <h2 id="job-detail-title" style="display:inline;margin-left:12px;font-size:1.3rem"></h2>
        </div>
        <div class="stats-overview" id="job-stats-bar" style="margin-bottom:20px"></div>
        <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
          <div style="flex:1;min-width:300px">
            <canvas id="price-history-chart" height="200"></canvas>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:20px">
          <div
            style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
            <h4 style="margin:0 0 8px;font-size:0.85rem;color:var(--text-secondary)">📊 Price Distribution</h4>
            <canvas id="price-dist-chart" height="160"></canvas>
          </div>
          <div
            style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
            <h4 style="margin:0 0 8px;font-size:0.85rem;color:var(--text-secondary)">📈 Supply Trend (Weekly)</h4>
            <canvas id="supply-trend-chart" height="160"></canvas>
          </div>
          <div
            style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
            <h4 style="margin:0 0 8px;font-size:0.85rem;color:var(--text-secondary)">⏱ Days on Market</h4>
            <canvas id="days-on-market-chart" height="160"></canvas>
          </div>
        </div>

        <!-- Grouping Section -->
        <div
          style="border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px;background:var(--card-bg)">
          <h3 style="margin:0 0 12px;font-size:1rem">📊 Grouping</h3>

          <!-- Auto group by field -->
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
            <label style="font-size:0.85rem;color:var(--text-secondary)">Auto group by field:</label>
            <select id="group-by-select" class="form-input" style="max-width:180px" onchange="loadJobGroups()"></select>
          </div>

          <!-- Custom group rules -->
          <details style="margin-top:8px">
            <summary style="cursor:pointer;font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">⚙️ Custom
              Group Rules (contains matching)</summary>
            <div id="custom-group-rules" style="margin-top:8px"></div>
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
              <button class="btn btn-sm btn-ghost" onclick="addCustomGroupRule()">+ Add Rule</button>
              <button class="btn btn-sm btn-primary" onclick="applyCustomGroups()">Apply Custom Groups</button>
            </div>
          </details>
        </div>

        <!-- Group results -->
        <div id="job-groups-grid" style="margin-bottom:20px"></div>

        <!-- Filter bar for listings -->
        <div class="filter-bar" style="margin-bottom:12px">
          <input class="form-input" id="job-listing-search" placeholder="Search title..." style="max-width:180px"
            onkeyup="if(event.key==='Enter')loadJobListingsFiltered()">
          <select id="job-listing-status">
            <option value="">All Status</option>
            <option value="active" selected>🟢 Active</option>
            <option value="sold">🔴 Sold</option>
            <option value="excluded">⛔ Excluded</option>
          </select>
          <select id="job-listing-sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="price_low">Price: Low → High</option>
            <option value="price_high">Price: High → Low</option>
            <option value="best_deal">🔥 Best Deals</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="job-listing-matched" checked> Matched only
          </label>
          <button class="btn btn-sm" onclick="loadJobListingsFiltered()">Apply</button>
        </div>

        <div class="listings-grid" id="job-listings-grid"></div>
        <div class="pagination" id="job-listings-pagination"></div>
      </section>
    </main>

    <!-- Wizard Modal -->
    <div class="modal-overlay" id="wizard-overlay" style="display:none">
      <div class="modal wizard-modal">
        <div class="modal-header">
          <h2 id="wizard-title">New Job</h2>
          <button class="modal-close" onclick="closeWizard()">&times;</button>
        </div>
        <div class="wizard-steps">
          <div class="step-indicator" id="step-indicators"></div>
        </div>
        <div class="modal-body" id="wizard-body"></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="wizard-back" onclick="wizardBack()">Back</button>
          <button class="btn btn-primary" id="wizard-next" onclick="wizardNext()">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
